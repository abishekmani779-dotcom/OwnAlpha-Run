<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            background: #333;
            color: white;
            overflow: hidden;
        }
    </style>
</head>

<body>
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 2, 8);

        const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        scene.add(new THREE.DirectionalLight(0xffffff, 2));
        scene.add(new THREE.AmbientLight(0xffffff, 1));
        scene.add(new THREE.GridHelper(10, 10));

        const loader = new GLTFLoader();

        // GIRL
        loader.load('models/girl_gameready_anim.glb', function (gltf) {
            const model = gltf.scene;
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const scaleFactor = 1.6 / size.y;
            model.scale.set(scaleFactor, scaleFactor, scaleFactor);
            model.position.set(-1, 0, 0);
            scene.add(model);
            console.log("Girl Size:", size.y, "Scale:", scaleFactor);
        });

        // KILLER
        loader.load('models/Killer.glb', function (gltf) {
            const kModel = gltf.scene;
            const box = new THREE.Box3().setFromObject(kModel);
            const size = box.getSize(new THREE.Vector3());
            // Currently using 0.8
            const scaleFactor = 0.8 / size.y;
            kModel.scale.set(scaleFactor, scaleFactor, scaleFactor);
            kModel.position.set(1, 0, 0);
            scene.add(kModel);
            console.log("Killer Size:", size.y, "Scale:", scaleFactor);
        });

        const animate = function () {
            requestAnimationFrame(animate);
            renderer.render(scene, camera);
        };
        animate();
    </script>
</body>

</html>
